blueprint:
  name: Halo – Nord Pool price-threshold charging (prototype)
  description: >-
    Early prototype that starts and stops a charging switch from the current
    Nord Pool price. This blueprint is not part of the active Phase 2 OCPP
    production architecture.
  domain: automation
  homeassistant:
    min_version: 2024.12.0
  input:
    price_sensor:
      name: Nord Pool current-price sensor
      description: Current electricity price, normally in SEK/kWh.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: monetary
    charging_switch:
      name: Charging control switch
      description: Switch used by this prototype to permit charging.
      selector:
        entity:
          filter:
            - domain: switch
    automation_enabled:
      name: Automatic charging enabled
      description: Input boolean used as the prototype's master switch.
      selector:
        entity:
          filter:
            - domain: input_boolean
    start_below:
      name: Start at or below
      description: Permit charging when the price is at or below this value.
      default: 0.75
      selector:
        number:
          min: -5
          max: 10
          step: 0.01
          unit_of_measurement: SEK/kWh
          mode: box
    stop_above:
      name: Stop at or above
      description: Set above the start threshold to provide stable hysteresis.
      default: 0.90
      selector:
        number:
          min: -5
          max: 10
          step: 0.01
          unit_of_measurement: SEK/kWh
          mode: box
    stop_on_invalid_price:
      name: Stop when the price is unavailable
      description: Recommended fail-safe behaviour for the prototype.
      default: true
      selector:
        boolean:

mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input price_sensor
  - trigger: time_pattern
    minutes: "/5"
  - trigger: homeassistant
    event: start

conditions:
  - condition: state
    entity_id: !input automation_enabled
    state: "on"

variables:
  price_entity: !input price_sensor
  charger_entity: !input charging_switch
  start_limit: !input start_below
  stop_limit: !input stop_above
  fail_safe_stop: !input stop_on_invalid_price
  price_state: "{{ states(price_entity) }}"
  price_value: "{{ states(price_entity) | float(0) }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ price_state in ['unknown', 'unavailable', 'none', '']
                 and fail_safe_stop
                 and is_state(charger_entity, 'on') }}
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input charging_switch

      - conditions:
          - condition: template
            value_template: >-
              {{ price_state not in ['unknown', 'unavailable', 'none', '']
                 and price_value <= (start_limit | float)
                 and not is_state(charger_entity, 'on') }}
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charging_switch

      - conditions:
          - condition: template
            value_template: >-
              {{ price_state not in ['unknown', 'unavailable', 'none', '']
                 and price_value >= (stop_limit | float)
                 and is_state(charger_entity, 'on') }}
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input charging_switch

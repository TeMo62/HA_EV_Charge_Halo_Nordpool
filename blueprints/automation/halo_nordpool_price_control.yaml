blueprint:
  name: Halo – price-controlled charging with Nord Pool
  description: >-
    Starts and stops a Charge Amps Halo through its charging switch based on
    the current Nord Pool price. Separate start and stop thresholds provide
    hysteresis and prevent frequent switching. A separate input_boolean acts
    as the automation's master switch.
  domain: automation
  homeassistant:
    min_version: 2024.12.0
  input:
    price_sensor:
      name: Nord Pool – current price
      description: Sensor for the current price, normally in SEK/kWh.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: monetary
    charging_switch:
      name: Halo – charging switch
      description: Switch from the Charge Amps integration that permits charging.
      selector:
        entity:
          filter:
            - domain: switch
    automation_enabled:
      name: Automatic charging enabled
      description: An input_boolean that acts as the master switch.
      selector:
        entity:
          filter:
            - domain: input_boolean
    start_below:
      name: Start at or below
      description: Charging is permitted when the price is at or below this level.
      default: 0.75
      selector:
        number:
          min: -5
          max: 10
          step: 0.01
          unit_of_measurement: SEK/kWh
          mode: box
    stop_above:
      name: Stop at or above
      description: Should be higher than the start threshold for stable hysteresis.
      default: 0.90
      selector:
        number:
          min: -5
          max: 10
          step: 0.01
          unit_of_measurement: SEK/kWh
          mode: box
    stop_on_invalid_price:
      name: Stop when the price is unavailable
      description: Recommended so the automation fails safely.
      default: true
      selector:
        boolean:

mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input price_sensor
  - trigger: time_pattern
    minutes: "/5"
  - trigger: homeassistant
    event: start

conditions:
  - condition: state
    entity_id: !input automation_enabled
    state: "on"

variables:
  price_entity: !input price_sensor
  charger_entity: !input charging_switch
  start_limit: !input start_below
  stop_limit: !input stop_above
  fail_safe_stop: !input stop_on_invalid_price
  price_state: "{{ states(price_entity) }}"
  price_value: "{{ states(price_entity) | float(0) }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ price_state in ['unknown', 'unavailable', 'none', '']
                 and fail_safe_stop
                 and is_state(charger_entity, 'on') }}
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input charging_switch

      - conditions:
          - condition: template
            value_template: >-
              {{ price_state not in ['unknown', 'unavailable', 'none', '']
                 and price_value <= (start_limit | float)
                 and not is_state(charger_entity, 'on') }}
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input charging_switch

      - conditions:
          - condition: template
            value_template: >-
              {{ price_state not in ['unknown', 'unavailable', 'none', '']
                 and price_value >= (stop_limit | float)
                 and is_state(charger_entity, 'on') }}
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input charging_switch
